:root {
  --bg: #0a0c0f; --surface: #111418; --panel: #181c22; --border: #232930;
  --muted: #3a424f; --dim: #6b7585; --text: #cdd5e0; --bright: #eef2f8;
  --green: #00d17a; --red: #ff4757; --blue: #3d8ef8; --purple: #a78bfa;
}

* { box-sizing: border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',sans-serif; font-size:14px; min-height:100vh; }

nav { display:flex; align-items:center; gap:24px; padding:0 20px; height:52px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.logo { font-family:'IBM Plex Mono',monospace; font-size:15px; font-weight:600; color:var(--green); }
.nav-tabs { display:flex; gap:2px; }
.nav-tab { padding:6px 14px; border-radius:4px; cursor:pointer; font-size:13px; color:var(--dim); background:none; border:none; }
.nav-tab.active { color:var(--green); background:rgba(0,209,122,0.08); }
.balance-badge { font-family:'IBM Plex Mono',monospace; background:var(--panel); border:1px solid var(--border); padding:4px 12px; border-radius:4px; }

.screen { display:none; }
.screen.active { display:block; }

.sim-layout { display:grid; grid-template-columns:1fr 300px; min-height:calc(100vh - 52px); }
.chart-area { background:var(--bg); padding:16px; }
canvas#chartCanvas { width:100%; height:100%; }

.screener-table th, .screener-table td { padding:10px 12px; border-bottom:1px solid var(--border); }
.screener-table th { color:var(--muted); font-size:11px; text-transform:uppercase; }
.change-up { color:var(--green); } .change-down { color:var(--red); }

.recent-trades { max-height:180px; overflow-y:auto; font-size:12px; }
.recent-trades div { padding:4px 0; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; }
</style>

// ENHANCED SMA CHART
function drawChart() {
  // ... your original candle drawing code ...
  // Add after candles:
  const sma = calculateSMA(visible, 20);
  ctx.strokeStyle = 'var(--purple)';
  ctx.lineWidth = 2.5;
  ctx.shadowBlur = 8; ctx.shadowColor = 'var(--purple)';
  ctx.beginPath();
  sma.forEach((val, i) => {
    const x = padL + i * cw + cw/2;
    const y = toY(val);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function calculateSMA(data, period) {
  const result = [];
  for (let i = period-1; i < data.length; i++) {
    let sum = 0;
    for (let j = 0; j < period; j++) sum += data[i-j].close;
    result.push(sum / period);
  }
  return result;
}

// FULL SCREENER
let allCoins = [];
async function loadScreener() {
  const res = await fetch(`${COINGECKO}/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1`);
  allCoins = await res.json();
  renderScreener(allCoins);
}
function renderScreener(coins) {
  let html = `<thead><tr><th>Coin</th><th>Price</th><th>24h</th><th>Volume</th><th>MCap</th><th></th></tr></thead><tbody>`;
  coins.forEach(c => {
    const chg = (c.price_change_percentage_24h || 0).toFixed(2);
    html += `<tr onclick="switchToCoin('${c.id}')" style="cursor:pointer">
      <td><strong>${c.symbol.toUpperCase()}</strong> ${c.name}</td>
      <td>$${c.current_price.toLocaleString()}</td>
      <td class="${chg>=0?'change-up':'change-down'}">${chg}%</td>
      <td>$${(c.total_volume/1e9).toFixed(2)}B</td>
      <td>$${(c.market_cap/1e9).toFixed(2)}B</td>
      <td><button onclick="event.stopImmediatePropagation();switchToCoin('${c.id}');showScreen('sim')">Trade</button></td>
    </tr>`;
  });
  html += '</tbody>';
  document.getElementById('screenerTable').innerHTML = html;
}
function filterScreener() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderScreener(allCoins.filter(c => c.name.toLowerCase().includes(q) || c.symbol.toLowerCase().includes(q)));
}
function switchToCoin(id) {
  currentCoin = id;
  document.getElementById('tickerSelect').value = id;
  changeTicker();
  showScreen('sim');
}
